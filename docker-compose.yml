version: "3.9"

# ============================================================
#  El Fogón Criollo — docker-compose.yml
#  Levanta todo el sistema con: docker compose up -d
#  Acceso LAN:  http://<tu-ip>:80
# ============================================================

services:

  # ── PostgreSQL 17 ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: fogon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fogon_criollo}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fogon_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fogon_criollo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fogon_net

  # ── Redis 7 (sesiones, cola de exportación, caché) ────────
  redis:
    image: redis:7-alpine
    container_name: fogon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fogon_net

  # ── Backend Express + Socket.io ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: fogon_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data/exports:/app/exports
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fogon_net

  # ── Frontend React + Vite ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: fogon_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-/}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - fogon_net

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fogon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot:/etc/letsencrypt:ro
      - ./data/exports:/app/exports:ro 
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fogon_net

  # ── pgAdmin (UI para PostgreSQL) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fogon_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fogon.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fogon_net
    profiles:
      - tools

  # ── Redis Commander (UI para Redis) ──────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fogon_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - fogon_net
    profiles:
      - tools

networks:
  fogon_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
